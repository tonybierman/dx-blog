name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0          # disabled for cache efficiency in CI
  RUST_BACKTRACE: short
  # Standalone Tailwind CLI version — matches the header in assets/tailwind.css.
  TAILWIND_VERSION: "4.1.5"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy (${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [sqlite, postgres]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: server-${{ matrix.backend }}
      # assets/tailwind.css is a generated artifact (gitignored) but the
      # `asset!()` macro needs it to exist at compile time. The standalone CLI
      # is self-contained — it resolves `@import "tailwindcss"` without npm.
      - name: Generate tailwind.css
        run: |
          curl -sSL "https://github.com/tailwindlabs/tailwindcss/releases/download/v${TAILWIND_VERSION}/tailwindcss-linux-x64" -o ./tailwindcss
          chmod +x ./tailwindcss
          ./tailwindcss -i tailwind.css -o assets/tailwind.css
      # `too_many_arguments` is allowed: several server fns legitimately take
      # many params (the wire boundary, not a refactor smell). Both feature
      # selections are gated so a dialect-specific lint regression is caught
      # before the build it would have broken at runtime.
      - name: Clippy (server,${{ matrix.backend }})
        run: |
          cargo clippy --no-default-features --features server,${{ matrix.backend }} --all-targets \
            -- -D warnings -A clippy::too_many_arguments

  test:
    name: cargo test (server,sqlite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: server-sqlite
      - name: Generate tailwind.css
        run: |
          curl -sSL "https://github.com/tailwindlabs/tailwindcss/releases/download/v${TAILWIND_VERSION}/tailwindcss-linux-x64" -o ./tailwindcss
          chmod +x ./tailwindcss
          ./tailwindcss -i tailwind.css -o assets/tailwind.css
      # Server-side unit tests (in-memory SQLite + #[tokio::test]). Postgres
      # coverage is in the `pg-migrate` job — those tests need a live database
      # and live in a separately-gated module.
      - run: cargo test --no-default-features --features server,sqlite

  pg-migrate:
    name: postgres migration apply
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: riparion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d riparion_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/riparion_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: server-postgres
      - name: Generate tailwind.css
        run: |
          curl -sSL "https://github.com/tailwindlabs/tailwindcss/releases/download/v${TAILWIND_VERSION}/tailwindcss-linux-x64" -o ./tailwindcss
          chmod +x ./tailwindcss
          ./tailwindcss -i tailwind.css -o assets/tailwind.css
      # Boots a postgres-feature build of the test target and runs every test
      # gated on `feature = "postgres"` — currently just `pg_migrations_apply`,
      # which exercises every migrator (arium core + membership + riparion blog)
      # against the live service. Catches dialect SQL regressions a clippy lint
      # can't see.
      - run: cargo test --no-default-features --features server,postgres

  wasm:
    name: check wasm client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
      - name: Generate tailwind.css
        run: |
          curl -sSL "https://github.com/tailwindlabs/tailwindcss/releases/download/v${TAILWIND_VERSION}/tailwindcss-linux-x64" -o ./tailwindcss
          chmod +x ./tailwindcss
          ./tailwindcss -i tailwind.css -o assets/tailwind.css
      # The browser side compiles for wasm32 without the `server` feature, so a
      # change can't silently break hydration. Clippy (not just `check`) runs here
      # too so the client half gets the same lint gate the server half does —
      # previously clippy only covered the server target. `dead_code` is allowed:
      # server-only symbols compile out on wasm and read as unused, which is
      # expected (same reason the old step used a plain `check`).
      - name: Clippy (wasm client)
        run: |
          cargo clippy --no-default-features --features web --target wasm32-unknown-unknown \
            -- -D warnings -A clippy::too_many_arguments -A dead_code

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tools
      - run: cargo install --locked cargo-audit
      # RustSec advisory scan against Cargo.lock.
      # RUSTSEC-2023-0071 (rsa Marvin Attack) is ignored: `rsa` only enters via
      # the sqlx-mysql driver, which neither the `server,sqlite` nor the
      # `server,postgres` feature combinations compile (cargo tree -i rsa is
      # empty in both), and the advisory has no fix.
      - run: cargo audit --ignore RUSTSEC-2023-0071

  unused-deps:
    name: cargo machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Honors the [package.metadata.cargo-machete] ignore list in Cargo.toml.
      - uses: bnjbvr/cargo-machete@main

  secrets:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Invoke the binary directly — gitleaks-action's license check is flaky
      # on personal accounts and fails closed.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          # Download to a file (fail on HTTP errors, retry transient ones) and
          # extract separately — piping curl straight into tar feeds any error
          # body to gzip and dies with "not in gzip format".
          curl -sSLf --retry 5 --retry-delay 3 --retry-all-errors \
            -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          sudo tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm -f gitleaks.tar.gz
          gitleaks version
      - run: gitleaks detect --source . --redact --verbose --no-banner
